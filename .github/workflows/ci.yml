name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    # Postgres with pgvector so migrations + integration tests have a real DB.
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ops
          POSTGRES_PASSWORD: ops
          POSTGRES_DB: ops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ops -d ops"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 20

    env:
      # No provider API keys are needed: providers are faked in tests. A dummy
      # value satisfies fail-fast settings validation ("at least one LLM key").
      DATABASE_URL: postgresql+asyncpg://ops:ops@localhost:5432/ops
      EMBEDDING_PROVIDER: huggingface
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
      LLM_PROVIDER: anthropic
      LLM_MODEL: claude-opus-4-7
      ANTHROPIC_API_KEY: dummy-key-for-ci
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Type check (mypy)
        run: python -m mypy src

      - name: Unit tests
        run: python -m pytest -m "not integration"

      - name: Migrate
        run: python -m alembic upgrade head

      - name: Integration tests
        run: python -m pytest -m integration
